<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Etta</title>
    <script>
      // Pre-hydration theme (kills the white flash for dark-theme users).
      // Reads the boot-time cache mirrored by applyTheme() in src/lib/theme.ts
      // ('etta-theme' is read-only here — the SQLite settings row remains the
      // source of truth; this script must never write). Defensive: storage or
      // matchMedia may be unavailable, and boot must never break over theming.
      (function () {
        try {
          var pref = window.localStorage.getItem("etta-theme");
          var dark =
            pref === "dark" ||
            ((pref === "system" || pref === null) &&
              typeof window.matchMedia === "function" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          /* never block boot on theme */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
